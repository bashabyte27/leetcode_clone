{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP | BashaByte</title>
    <!-- Bootstrap 5 CSS (grid & utilities only) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Separate LeetCode-style CSS -->
    <link rel="stylesheet" href="{% static 'css/otp.css' %}">
</head>
<body>
    <div class="container d-flex align-items-center justify-content-center min-vh-100">
        <div class="lc-card text-center" style="max-width: 440px; width: 100%;">
            <!-- Logo -->
            <img src="{% static 'images/logo.png' %}" alt="BashaByte" height="42" class="mb-3">
            <h5 class="fw-semibold mt-2" style="color: var(--text-primary);">Verify OTP</h5>
            <p class="text-lc-secondary small">We sent a 6‑digit code to<br><strong>{{ email|default:"your@email.com" }}</strong></p>

            <!-- Error messages (from Django messages or view context) -->
            {% if error %}
                <div class="alert-error mb-3">{{ error }}</div>
            {% endif %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="alert-error mb-3">{{ msg }}</div>
                {% endfor %}
            {% endif %}

            <form method="post" action="">
                {% csrf_token %}
                <div class="mb-4">
                    <input type="text" name="otp_code" id="otp_code" class="lc-input form-control"
                           maxlength="6" inputmode="numeric" pattern="[0-9]{6}"
                           placeholder="••••••" autocomplete="off" required>
                </div>

                <!-- No JavaScript – OTP expiry handled by backend -->
                <button type="submit" name="verify-otp" class="btn-lc-green mb-2">Verify & Create Account</button>
                <button type="submit" name="resend-otp" class="lc-link bg-transparent border-0 d-block w-100 mt-2">Resend OTP</button>
            </form>

            <hr class="my-4" style="border-color: var(--border);">
            <a href="{% url 'users:register' %}" class="lc-link small">← Back to Register</a>
        </div>
    </div>
</body>
</html>
